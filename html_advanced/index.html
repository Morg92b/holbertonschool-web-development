<!DOCTYPE html> 
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmileSchool</title>
</head>

<body>

    <!-- Header -->
    <header>
        <a href="#">
            <img src="assets/logo.png" alt="Logo">
        </a>

        <nav>
            <a href="#">COURSES</a>
            <a href="#">PRICING</a>
            <a href="#">LOGIN</a>
        </nav>
    </header>

    <!-- MAIN -->
    <main>
        <section>

            <!-- HERO / BANNER -->
            <div>
                <h1>Get schooled</h1>

                <p>SMILES GRIN LAUGH</p>

                <button>REGISTER FOR FREE</button>
            </div>

            <!-- PROS SECTION -->
            <div>
                <h2>Learn from the pros</h2>

                <div>
                    <!-- Person 1 -->
                    <div>
                        <img src="assets/philip.png" alt="Philip Massey">

                        <p>« Smile of the year »<br>2018 - 2019</p>
                    </div>

                    <!-- Person 2 -->
                    <div>
                        <img src="assets/nannie.png" alt="Nannie Lawrence">
                        <h3>Nannie Lawrence</h3>
                        <p>Best « little smile »<br>2017</p>
                    </div>

                    <!-- Person 3 -->
                    <div>
                        <img src="assets/bruce.png" alt="Bruce Walters">
                        <h3>Bruce Walters</h3>
                        <p>Best « Friend Smile »<br>live performance 2019</p>
                    </div>

                    <!-- Person 4 -->
                    <div>
                        <img src="assets/henry.png" alt="Henry Hughes">
                        <h3>Henry Hughes</h3>
                        <p>« 24h smiles » winner<br>2016 - 2019</p>
                    </div>
                </div>
            </div>
